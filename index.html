<!DOCTYPE html>
<html>
<head>
     <link rel="stylesheet" href="style.css">


     <script src="constants.js"></script>
     <script src="card.js"></script>
     <script src="photo-card.js"></script>
     <script src="color-grid.js"></script>
     <script src="engine-deck.js"></script>
     <script src="engine-card.js"></script>
     <script src="engine.js"></script>
     <script src="adversary-card.js"></script>

     <script src="script.js"></script>
</head>

<body>

<div id="text-box">
    <div id="text-content"></div>
    <div id="text-options"></div>
</div>

<div id="shared-stuff">
    <div id="grid-area">
        <div id="color-grid"></div>
    </div>

    <div id="deck-areas">
        <div id="engine-area">
            <div id="engine-deck"></div>
            <div id="engine-stock"></div>
        </div>

        <div id="adversary-area">
            <div id="adversary-deck"></div>
            <div id="adversary-discard"></div>
            <div id="stolen-cards"></div>
        </div>

        <div style="display: flex; flex-direction:row">
            <div>
                <h1>Power Cheat Sheet</h1>
                <ul>
                    <li> A : take one face up Photo Card from grid</li>
                    <li> B : flip Photo Cards in a cross pattern</li>
                    <li> C : swap two cards in Grid</li>
                    <li> D : trade Photo or Engine Cards with another player</li>
                </ul>
            </div>
            <div>
                <h1>Thief Cheat Sheet</h1>
                <ul>
                    <li> a : Shuffle Row/Col</li>
                    <li> b : Flip Row/Col</li>
                    <li> Z : Data Breach!</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div id="player-areas"></div>

<body></html>
